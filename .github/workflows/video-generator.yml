name: Video Generator

on:
  workflow_run:
    workflows: ["AI News Pipeline"]
    types: [completed]
  workflow_dispatch:

jobs:
  generate-videos:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: agents/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r agents/requirements.txt

      - name: Write YouTube token
        run: echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > agents/token.json

      - name: Generate and upload videos
        env:
          SITE_ID:              ai-hoy
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_TOKEN_JSON:   ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: python agents/video_generator.py
