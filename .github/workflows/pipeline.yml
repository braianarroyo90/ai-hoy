name: AI News Pipeline

on:
  schedule:
    - cron: "0 9 * * *"   # once a day at 9:00 UTC (6am Argentina)
  workflow_dispatch:          # allows manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: agents/requirements.txt

      - name: Verify checkout
        run: |
          git log --oneline -3
          echo "--- redactor.py first 10 lines ---"
          head -10 agents/redactor.py

      - name: Install dependencies
        run: pip install -r agents/requirements.txt

      - name: Run Crawler
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python agents/crawler.py

      - name: Run Curator
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python agents/curator.py

      - name: Run Redactor
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
        run: python agents/redactor.py
